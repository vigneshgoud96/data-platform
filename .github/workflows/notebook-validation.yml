name: Databricks Notebook Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'databricks/notebooks/**'
      - '.github/workflows/notebook-validation.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'databricks/notebooks/**'

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  WORKSPACE_PATH: /Workspace/Repos/data-platform

jobs:
  validate-notebooks:
    name: Validate Databricks Notebooks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli pyspark pandas pytest pytest-cov flake8 black pylint

      - name: Lint Python notebooks
        id: lint
        continue-on-error: true
        run: |
          echo "🔍 Starting code linting..."
          
          # Find all Python notebook files
          NOTEBOOKS=$(find databricks/notebooks -name "*.py" -type f)
          LINT_FAILED=0
          
          for notebook in $NOTEBOOKS; do
            echo "Linting: $notebook"
            
            # Run flake8
            if ! flake8 "$notebook" --max-line-length=120 --exclude=__pycache__ --count; then
              LINT_FAILED=1
            fi
            
            # Check code style with black (dry-run)
            if ! black "$notebook" --check --line-length=120 2>/dev/null; then
              echo "⚠️ Code style issues in $notebook (can be auto-fixed with black)"
            fi
            
            # Run pylint
            if ! pylint "$notebook" --disable=all --enable=E,F --exit-zero; then
              echo "⚠️ PyLint warnings in $notebook"
            fi
          done
          
          if [ $LINT_FAILED -eq 1 ]; then
            echo "❌ Linting failed"
            exit 1
          fi
          echo "✅ Linting passed"

      - name: Validate notebook syntax
        id: syntax-check
        run: |
          echo "🔍 Validating Python syntax..."
          
          NOTEBOOKS=$(find databricks/notebooks -name "*.py" -type f)
          SYNTAX_FAILED=0
          
          for notebook in $NOTEBOOKS; do
            echo "Checking syntax: $notebook"
            
            # Compile Python to check syntax
            if ! python -m py_compile "$notebook"; then
              echo "❌ Syntax error in $notebook"
              SYNTAX_FAILED=1
            else
              echo "✅ Syntax valid: $notebook"
            fi
          done
          
          if [ $SYNTAX_FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Validate notebook structure
        id: structure-check
        run: |
          echo "🔍 Validating notebook structure..."
          
          python << 'EOF'
          import os
          import re
          
          required_sections = {
              'imports': r'from pyspark\.sql|import pyspark',
              'configuration': r'BRONZE_PATH|SILVER_PATH|DATABASE_NAME',
              'functions': r'def \w+\(',
              'main_execution': r'def main\(\)|result_df = ',
              'logging': r'logging\.|logger\.'
          }
          
          notebooks = []
          for root, dirs, files in os.walk('databricks/notebooks'):
              for file in files:
                  if file.endswith('.py'):
                      notebooks.append(os.path.join(root, file))
          
          all_valid = True
          
          for notebook_path in notebooks:
              print(f"\n📋 Checking structure: {notebook_path}")
              with open(notebook_path, 'r') as f:
                  content = f.read()
              
              missing = []
              for section, pattern in required_sections.items():
                  if not re.search(pattern, content):
                      missing.append(section)
              
              if missing:
                  print(f"  ⚠️  Missing sections: {', '.join(missing)}")
                  all_valid = False
              else:
                  print(f"  ✅ Structure valid")
          
          if not all_valid:
              print("\n❌ Some notebooks have missing required sections")
              exit(1)
          else:
              print("\n✅ All notebooks have valid structure")
          EOF

      - name: Check for security issues
        id: security-check
        continue-on-error: true
        run: |
          echo "🔍 Scanning for security issues..."
          
          python << 'EOF'
          import os
          import re
          
          security_patterns = {
              'hardcoded_secrets': r'(password|secret|api_key|token)\s*=\s*["\']',
              'sql_injection': r'\.format\(|f["\'].*\{.*\}',
              'eval_usage': r'eval\(|exec\(',
          }
          
          notebooks = []
          for root, dirs, files in os.walk('databricks/notebooks'):
              for file in files:
                  if file.endswith('.py'):
                      notebooks.append(os.path.join(root, file))
          
          issues_found = False
          
          for notebook_path in notebooks:
              with open(notebook_path, 'r') as f:
                  lines = f.readlines()
              
              for i, line in enumerate(lines, 1):
                  for issue_type, pattern in security_patterns.items():
                      if re.search(pattern, line, re.IGNORECASE):
                          print(f"⚠️  {notebook_path}:{i} - Potential {issue_type}")
                          print(f"   {line.strip()}")
                          if 'hardcoded' in issue_type:
                              issues_found = True
          
          if issues_found:
              print("\n❌ Security issues detected")
              exit(1)
          else:
              print("\n✅ No security issues detected")
          EOF

      - name: Test imports
        id: import-test
        run: |
          echo "🔍 Testing imports..."
          
          python << 'EOF'
          import sys
          
          required_imports = [
              'pyspark',
              'datetime',
              'logging',
          ]
          
          print("Testing required imports...")
          failed = []
          
          for module in required_imports:
              try:
                  __import__(module)
                  print(f"✅ {module}")
              except ImportError as e:
                  print(f"❌ {module}: {e}")
                  failed.append(module)
          
          if failed:
              print(f"\n❌ Missing imports: {', '.join(failed)}")
              exit(1)
          else:
              print("\n✅ All required imports available")
          EOF

      - name: Validate Databricks configuration
        id: config-validation
        run: |
          echo "🔍 Validating Databricks configuration..."
          
          python << 'EOF'
          import os
          import json
          
          config_files = [
              'databricks/configs/cluster_config.json',
              'databricks/configs/job_config.json',
          ]
          
          for config_file in config_files:
              if os.path.exists(config_file):
                  print(f"Validating: {config_file}")
                  try:
                      with open(config_file, 'r') as f:
                          json.load(f)
                      print(f"✅ Valid JSON: {config_file}")
                  except json.JSONDecodeError as e:
                      print(f"❌ Invalid JSON in {config_file}: {e}")
                      exit(1)
              else:
                  print(f"⚠️  Config file not found: {config_file}")
          
          print("\n✅ Configuration validation passed")
          EOF

      - name: Generate test coverage report
        id: coverage
        run: |
          echo "📊 Generating test coverage report..."
          
          if [ -d "databricks/tests" ]; then
            pytest databricks/tests --cov=databricks/notebooks --cov-report=xml --cov-report=html || true
            echo "📈 Coverage report generated"
          else
            echo "ℹ️  No tests directory found"
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Comment validation results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 📋 Notebook Validation Report\n\n';
            comment += '| Check | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| Linting | ${{ steps.lint.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |\n';
            comment += '| Syntax | ${{ steps.syntax-check.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |\n';
            comment += '| Structure | ${{ steps.structure-check.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |\n';
            comment += '| Security | ${{ steps.security-check.outcome == 'success' && '✅ Passed' || '⚠️ Review' }} |\n';
            comment += '| Imports | ${{ steps.import-test.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |\n';
            comment += '| Configuration | ${{ steps.config-validation.outcome == 'success' && '✅ Passed' || '⚠️ Review' }} |\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Create validation summary
        if: always()
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Linting**: ${{ steps.lint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Syntax Check**: ${{ steps.syntax-check.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Structure Check**: ${{ steps.structure-check.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Security Check**: ${{ steps.security-check.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Import Test**: ${{ steps.import-test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Config Validation**: ${{ steps.config-validation.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail job if validation failed
        if: |
          steps.lint.outcome == 'failure' ||
          steps.syntax-check.outcome == 'failure' ||
          steps.structure-check.outcome == 'failure' ||
          steps.import-test.outcome == 'failure'
        run: |
          echo "❌ Notebook validation failed"
          exit 1
